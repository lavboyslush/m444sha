<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masha Poetry</title>

    <meta property="og:image" content="bg/lotus.jpeg">

    <style>
        * {
            margin: 0;
            padding: 0;

        }

        @font-face {
            font-family: "Champ";
            src: url("fonts/champ.otf") format("opentype");
            font-weight: normal;
            font-style: normal;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: start;

            overflow: hidden;

            height: 100dvh;
            width: 100vw;

        }

        .bookscroll {
            z-index: 1;
            width: 100%;
            height: auto;

            overflow-y: auto;

            display: flex;
            justify-content: center;
            align-items: center;

        }

        .section {
     
            height: 100dvh;
            scroll-snap-type: y mandatory;
            display: flex;
            justify-content: center;
            align-items: center;
        }


        .bookdiv {

            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;

            width: 13vw;
            margin: 5vw;
            height: auto;
            /* background-color: antiquewhite; */
            overflow: hidden;

            cursor: pointer;
        }

        .bookdiv img {
            object-fit: contain;

            width: 100%;
        }



        #floral {
            position: fixed;
            width: 100vw;
            height: 100dvh;

            z-index: 0;
            object-fit: cover;
            inset: 0;

        }

        #home {
            position: absolute;
            bottom: 0;
            z-index: 2;
            margin: 0vw;
        }

        #home img {
            width: 15vw;

        }

        #head {
            z-index: 2;
            position: absolute;
            top: 0;
            font-size: 9vw;
            padding: 3vw;
            font-family: "Champ";

            pointer-events: none;

            color: rgb(255, 255, 255);

           
        }
        a{
            color: white;
        }

        @media (max-width: 600px) {
            .bookdiv {



                width: 55vw;
                height: auto;

                flex-direction: column;

            }

            #home {
                position: absolute;
                bottom: 0;
                z-index: 2;
                margin: 5vw;
                font-size: 7vw;

                color: white;
            }

            #home img {
                width: 40vw;
            }

            #head {
                z-index: 2;
                position: absolute;
                top: 0;
                font-size: 25vw;
                padding: 10vw;
                font-family: "Champ";


            }

            .bookscroll {
                height: 100dvh;
                display: block;
               
            }

            .section {
       
                
                height: 100dvh;
              
            }
        }
    </style>
</head>

<body>
    <p id="head">Poetry</p>
    <a id="home" href="index.html">
        <!-- <p>www.m44sha.com</p> -->
        <img src="icons/ballet.png" alt="">
    </a>

    <img id="floral" src="bg/lotus.jpeg" alt="">

    <div class="bookscroll">
        <div class="section">

            <a href="library.html?swan" target="_blank" class="bookdiv">

                <img src="swan/1.webp" alt="">
                <p>click to read</p>
            </a>



        </div>
        <div class="section">
            <a href="library.html?eternal" target="_blank" class="bookdiv">

                <img src="eternal/1.webp" alt="">
                <p>click to read</p>
            </a>

        </div>





    </div>


</body>

</html>
