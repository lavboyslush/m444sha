    <style>
        * {
            margin: 0;
            padding: 0;

        }

        a {
            text-decoration: none;
        }

        img {
            -webkit-user-drag: none;
            user-select: none;
        }

        @font-face {
            font-family: "Champ";
            src: url("fonts/champ.otf") format("opentype");
            font-weight: normal;
            font-style: normal;
        }

        body {
            display: flex;
            justify-content: start;
            align-items: center;
            flex-direction: column;

            height: auto;


        }

        #bg {
            width: 100vw;
            height: auto;

            overflow: hidden;

        }


        .bg {

            width: 100vw;
            background-position: center;
            height: 50dvh;


        }

        #bg2 {



            background-image: url(bg/fire.jpg);
            background-position: 100vw 35%;


            display: flex;
            justify-content: center;
            align-items: center;

        }

        #bg1 {
            height: 100dvh;


            background-image: url(bg/polka.png);


        }

        #stripdiv {
            position: absolute;
            height: 100dvh;
            width: 100vw;

            display: flex;
            justify-content: center;
            align-items: center;

            pointer-events: none;
        }

        #strip {


            width: 100vw;
        }

        #title {

            color: white;
            position: absolute;
            font-size: 15vw;
            font-family: 'Champ';

        }

        #ev {

            padding: 1.5vw;
            position: absolute;
            color: white;
            font-size: 5vw;
            font-family: 'Champ';

            bottom: 25dvh;
            right: 25vw;
            display: none;
            background-image: url(bg/pink.jpg);
            background-size: 100% 100%;
        }

        @keyframes tilt {
            0% {
                transform: rotate(-1deg);
            }

            50% {
                transform: rotate(1deg);
            }

            100% {
                transform: rotate(-1deg);
            }
        }


        .icon {
            position: absolute;

            animation: tilt 1s ease-in-out infinite;
            transition: filter 0.3s ease-in-out;


        }

        .icon.show img {
            animation: popIn 0.3s ease forwards;
        }

        @keyframes popIn {
            from {
                transform: scale(0);
            }

            to {

                transform: scale(1);
            }
        }

        .icon:hover {
            filter: blur(2px);

        }

        .icon:hover img {
            transform: scale(1.05);
        }

        .icon img {
            transition: transform 0.3s ease-in-out;
            transform: scale(0);
        }

        #deer {
            left: 5vw;
            bottom: 2dvh;
        }

        #deer img {
            width: 15vw;
        }

        #wings {
            left: 6vw;
            top: 2dvh;
        }

        #wings img {
            width: 20vw;
        }

        #ballet {
            bottom: 0;
        }

        #ballet img {
            width: 20vw;
        }

        #key {
            left: 30vw;
            bottom: 5dvh;
        }

        #key img {
            width: 15vw;
        }

        #doll {
            left: 50vw;
            bottom: 2dvh;
        }

        #doll img {
            width: 10vw;
        }

        #thankdiv {
            width: 100vw;
            position: absolute;
            bottom: -50dvh;

            height: 50dvh;

            z-index: 10;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;

            font-size: 1.5vw;
        }

        #thankdiv p,
        #thankdiv a {
            margin: 0.5vw;
            color: black;
        }

        #thanks {
            animation: tilt 1s ease-in-out infinite;
            width: 30vw;
        }

        @media (max-width: 600px) {


            #title {
                font-size: 35vw;

            }

            #bg {
                height: 150dvh;
            }

            .bg {
                height: auto;
            }

            #bg2 {
                height: 24%;
                background-position: 80% 30%;
            }

            #bg1 {
                height: 100%;


            }

            #stripdiv {

                height: 70dvh;

            }


            #deer {
                left: 5vw;
                bottom: 30dvh;
            }

            #deer img {
                width: 35vw;
            }

            #wings {
                left: auto;
                right: 5vw;
                top: auto;
                bottom: 40dvh;
            }

            #wings img {
                width: 40vw;
            }

            #ballet {
                bottom: 0;
                left: 0;
            }

            #ballet img {
                width: 50vw;
            }

            #key {

                left: 10vw;
                right: auto;
                bottom: 2dvh;
            }

            #key img {
                width: 40vw;
            }

            #doll {
                left: auto;
                right: 10vw;
                bottom: 2dvh;
            }

            #doll img {
                width: 32vw;
            }

            #thankdiv {

                bottom: -50dvh;
                height: 50dvh;

                font-size: 5vw;
            }

            #thankdiv p,
            #thankdiv a {
                margin: 3vw;
                color: black;
            }

            #thanks {

                width: 70vw;
            }
        }
    </style>
</head>

<body>



    <p id="ev">everything has a soul</p>

    <div id="bg">

        </div>

    </div>

    <div class="icon" id="deer">

    </div>
    <div class="icon" id="wings">
        <a href="articles.html">
            <img src="icons/wings.png" alt="">
        </a>
    </div>
    <!-- <div class="icon" id="ballet">
        <img src="icons/ballet.png" alt="">
    </div> -->
    <div class="icon" id="key">
        <a href="photo.html">
            <img src="icons/key.png" alt="">
        </a>
    </div>
    <div class="icon" id="doll">
        <a href="films.html">
            <img src="icons/doll.png" alt="">
        </a>
    </div>

    <div id="thankdiv">
        <img id="thanks" src="bg/thanks.png" alt="">
        <a href="https://www.instagram.com/m444sha/" target="_blank">@m444sha on Instagram </a>
        <p id="mail" onclick="copyEmail()">• krupnovamasha444@gmail.com</p>
    </div>
</body>


<script>
    window.addEventListener("load", () => {
        const icons = document.querySelectorAll(".icon");

        icons.forEach((icon, i) => {
            setTimeout(() => {
                icon.classList.add("show");
            }, i * 200); // 150ms delay between each icon
        });
    });
</script>

<script>
    function copyEmail() {
        const email = "krupnovamasha444@gmail.com";

        navigator.clipboard.writeText(email).then(() => {
            // Optional feedback
            const el = document.getElementById('mail');
            const originalText = el.innerText;
            el.innerText = "✓ Copied!";
            setTimeout(() => el.innerText = originalText, 1000);
        });
    }
</script>
</script>
